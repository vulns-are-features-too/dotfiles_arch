add_newline = false

format = """
$shell\
$sudo\
❯ \
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_commit\
$java\
$nodejs\
$python\
$line_break\
$status\
$character\
"""

[directory]
truncation_length = 10
truncate_to_repo = false
style = "bold green"

[git_branch]
format = "[$symbol$branch]($style)"

[git_status]
conflicted = "!"
modified = "="
staged = "+"
deleted = "X"

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vicmd_symbol = "[V](bold green)"

[shell]
disabled = false
bash_indicator = "[B](bold green)"
zsh_indicator = "[Z](bold white)"
powershell_indicator = "[PS](bold blue)"
cmd_indicator = "[CMD](bold purple)"

[sudo]
disabled = false
symbol = "#"
style = "bold red"
format = "[$symbol]($style) "

[java]
format = '[${symbol} ${pyenv_prefix}(${version}) (\(venv: $virtualenv\))]($style)'
symbol = "Java"
version_format = "${raw}"
style = 'yellow bold'

[nodejs]
format = '[${symbol} ${pyenv_prefix}(${version}) (\(venv: $virtualenv\))]($style)'
symbol = "NodeJS"
version_format = "${raw}"
style = 'yellow bold'

[python]
format = '[${symbol} ${pyenv_prefix}(${version}) (\(venv: $virtualenv\))]($style)'
symbol = "Python"
version_format = "${raw}"
style = 'yellow bold'

